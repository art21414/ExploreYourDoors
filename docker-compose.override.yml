services:
  frontend:
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
  backend:
    environment:
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/assets:/app/assets

  mysql:
    ports:
      - "3306:3306"
