services:
  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    depends_on:
      - backend

  backend:
    build: ./backend
    expose:
      - "3000"
    volumes:
      - ./frontend/public/uploads:/app/frontend/public/uploads
      - ./backend/src:/app/src
      - ./backend/assets:/app/assets
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: door_store
    networks:
      - app-network
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: door_store
    volumes:
      - ./db:/docker-entrypoint-initdb.d
      - ./my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - app-network

  xss-catcher:
    build: ./backend/xss-catcher
    ports:
      - "3030:3030"
    volumes:
      - ./backend/xss-catcher:/app
      - /app/node_modules
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
