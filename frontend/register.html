<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | ExploreYourDoors</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <!-- Шапка -->
    <header class="header">
        <div class="header-content">
            <h1 class="logo">ExploreYourDoors</h1>
            <nav class="nav">
                <button id="loginBtn" class="nav-btn" onclick="window.location.href='login.html'">Вход</button>
                <button id="homeBtn" class="nav-btn" onclick="window.location.href='index.html'">На главную</button>
            </nav>
        </div>
    </header>
    
    <!-- Контейнер регистрации -->
    <div class="auth-container">
        <div class="auth-header">
            <h2 class="auth-title">Создать аккаунт</h2>
            <p class="auth-subtitle">Присоединяйтесь к нам и откройте мир качественных дверей</p>
        </div>
        
        <form id="registerForm" class="auth-form">
            <div class="form-group">
                <label for="username" class="form-label">Имя пользователя</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="Придумайте имя пользователя" required>
                <span class="error-message">Имя пользователя должно содержать не менее 3 символов</span>
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Пароль</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="Придумайте пароль" required>
                <span class="error-message">Пароль должен содержать не менее 6 символов</span>
            </div>
            
            <div class="form-group">
                <label for="password-confirm" class="form-label">Подтверждение пароля</label>
                <input type="password" id="password-confirm" name="password-confirm" class="form-input" placeholder="Повторите пароль" required>
                <span class="error-message">Пароли не совпадают</span>
            </div>
            
            <button type="submit" class="auth-button">Зарегистрироваться</button>
        </form>
        
        <div class="auth-footer">
            <p>Уже есть аккаунт? <a href="login.html" class="auth-link">Войдите</a></p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
