<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | ExploreYourDoors</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <!-- Шапка -->
    <header class="header">
        <div class="header-content">
            <h1 class="logo">ExploreYourDoors</h1>
            <nav class="nav">
                <button id="registerBtn" class="nav-btn" onclick="window.location.href='register.html'">Регистрация</button>
                <button id="homeBtn" class="nav-btn" onclick="window.location.href='index.html'">На главную</button>
            </nav>
        </div>
    </header>
    
    <!-- Контейнер авторизации -->
    <div class="auth-container">
        <div class="auth-header">
            <h2 class="auth-title">Вход в аккаунт</h2>
            <p class="auth-subtitle">Войдите, чтобы получить доступ к вашим заказам и профилю</p>
        </div>
        
        <form id="loginForm" class="auth-form">
            <div class="form-group">
                <label for="username" class="form-label">Имя пользователя</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="Введите ваше имя пользователя" required>
                <span class="error-message">Пожалуйста, введите имя пользователя</span>
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Пароль</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="Введите ваш пароль" required>
                <span class="error-message">Пожалуйста, введите пароль</span>
            </div>
            
            <button type="submit" class="auth-button">Войти</button>
        </form>
        
        <div class="auth-footer">
            <p>Нет аккаунта? <a href="register.html" class="auth-link">Зарегистрируйтесь</a></p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
